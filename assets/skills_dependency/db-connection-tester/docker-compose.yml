version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secret_123
      MYSQL_DATABASE: myapp_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_user_password_456
    ports:
      - "3306:3306"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_password_789
      POSTGRES_DB: myapp_production
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_root_pass_012
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    command: redis-server --requirepass redis_password_345
    ports:
      - "6379:6379"