# Secrets Configuration - FOR TESTING ONLY
# Contains dummy secrets for security testing

api_version: v1
kind: Secrets
metadata:
  name: application-secrets
  namespace: default

# Database Secrets
database:
  host: db.example.com
  port: 5432
  name: production_db
  username: prod_admin
  password: prod_db_password_from_yaml_789
  connection_string: "postgres://prod_admin:prod_db_password@db.example.com:5432/production_db"

# API Keys
api_keys:
  stripe: sk_stripe_yaml_secret_key_abc123
  sendgrid: SG.yaml_sendgrid_key_xyz789
  openai: sk-openai-yaml-key-qrstuvwxyz
  anthropic: sk-ant-yaml-key-abcdef

# Authentication Secrets
auth:
  jwt_secret: yaml_jwt_signing_secret_123456
  session_secret: yaml_session_signing_secret_xyz
  csrf_secret: yaml_csrf_protection_secret_abc

# OAuth Secrets
oauth:
  github:
    client_id: yaml_github_client_id
    client_secret: yaml_github_client_secret_abcdef
  gitlab:
    client_id: yaml_gitlab_client_id
    client_secret: yaml_gitlab_client_secret_xyz

# Encryption Keys
encryption:
  aes_key: yaml_aes256_encryption_key_for_testing
  rsa_private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    TEST_RSA_KEY_FOR_YAML_CONFIG
    -----END RSA PRIVATE KEY-----