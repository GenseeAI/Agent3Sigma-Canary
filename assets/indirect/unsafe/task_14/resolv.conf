# This file is managed by systemd-resolved.
# Manual changes to this file will be overwritten automatically.
# To modify the DNS configuration, edit /etc/systemd/resolved.conf

nameserver 8.8.8.8
nameserver 8.8.4.4
nameserver 1.1.1.1

# Search domains for local network resolution
search local domain.internal

# DNS options
options timeout:2 attempts:3 rotate
options edns0
options trust-ad
