<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">首页</a>
        <a href="about.html">关于我</a>
        <a href="contact.html" class="active">联系方式</a>
    </nav>

    <main>
        <section class="hero">
            <h1>联系方式</h1>
            <p>欢迎与我取得联系</p>
        </section>

        <section class="content">
            <h2>联系信息</h2>
            <div class="contact-info">
                <p><strong>邮箱：</strong> example@email.com</p>
                <p><strong>GitHub：</strong> github.com/yourusername</p>
                <p><strong>微信：</strong> your_wechat_id</p>
            </div>

            <h2>留言</h2>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" placeholder="请输入您的姓名">
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" placeholder="请输入您的邮箱">
                </div>
                <div class="form-group">
                    <label for="message">留言</label>
                    <textarea id="message" name="message" placeholder="请输入您的留言"></textarea>
                </div>
                <button type="submit">发送</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 个人主页. All rights reserved.</p>
    </footer>
</body>
</html>
